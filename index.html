<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆作业管理系统 v3.3</title>
    <script>
        // Must run BEFORE Tailwind loads to intercept its warning
        const _warn = console.warn.bind(console);
        console.warn = (...args) => {
            if (typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
            _warn(...args);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .vin-font { font-family: 'ui-monospace', monospace; letter-spacing: -0.02em; }
        .plate-ev { font-size: 10px; padding: 2px 4px; border-radius: 3px; font-weight: 800; background: linear-gradient(to bottom, #f0fdf4, #bbf7d0); color: #166534; border: 1px solid #86efac; white-space: nowrap; }
        .plate-std { font-size: 10px; padding: 2px 4px; border-radius: 3px; font-weight: 800; border: 1px solid rgba(0,0,0,0.1); white-space: nowrap; }
        .energy-label { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 900; white-space: nowrap; }
        .overlay { background-color: rgba(0,0,0,0.4); backdrop-filter: blur(4px); transition: opacity 0.3s; pointer-events: none; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .sheet { transition: transform 0.3s cubic-bezier(0.33, 1, 0.68, 1); border-radius: 24px 24px 0 0; }
        .hidden-sheet { transform: translateY(100%); }
        .filter-btn-active { border-color: #2563eb !important; background-color: #eff6ff !important; color: #2563eb !important; border-width: 2px !important; }
        #search-bar { transition: all 0.2s ease; width: 0; opacity: 0; overflow: hidden; }
        #search-bar.active { width: 100%; opacity: 1; }
        .page { display: none; }
        .page.active { display: flex; flex-direction: column; min-height: 100vh; }
        .status-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 800; }
        .timeline-connector { position: absolute; left: 11px; top: 28px; bottom: -6px; width: 2px; background: #e2e8f0; }
        /* PC table layout */
        @media (min-width: 900px) {
            body { background: #f1f5f9; }
            .mobile-shell { max-width: none !important; box-shadow: none !important; background: transparent !important; }
            .page.active { min-height: 100vh; }
            #page-list { background: transparent; }
            #pc-header { display: flex !important; }
            #mobile-header { display: none !important; }
            #list-container { display: none !important; }
            #pc-table-area { display: block !important; }
            .sheet, .overlay { max-width: 480px; left: 50%; transform: translateX(-50%); }
            .overlay { max-width: none; left: 0; transform: none; }
            .hidden-sheet { transform: translateX(-50%) translateY(100%) !important; }
        }
        @media (max-width: 899px) {
            #pc-header { display: none !important; }
            #pc-table-area { display: none !important; }
        }
        .pc-table th { position: sticky; top: 0; background: #f8fafc; z-index: 2; }
        .pc-row:hover td { background: #f0f9ff; }
        .pc-row td { border-bottom: 1px solid #f1f5f9; }
        .pagination-btn { min-width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: 1px solid #e2e8f0; }
        .pagination-btn:hover { background: #eff6ff; border-color: #93c5fd; color: #2563eb; }
        .pagination-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .pagination-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">
<div class="max-w-md mx-auto bg-white shadow-xl font-sans relative mobile-shell" id="app-shell">

    <!-- ===== PAGE: LIST ===== -->
    <div id="page-list" class="page active">
        <!-- Mobile header -->
        <header id="mobile-header" class="p-4 border-b sticky top-0 bg-white/95 backdrop-blur-md z-20">
            <div class="flex justify-between items-center h-8">
                <h1 id="header-title" class="text-xl font-black tracking-tighter text-slate-800">车辆作业台</h1>
                <div id="search-bar" class="flex items-center bg-slate-100 rounded-full px-3 py-1 ml-2">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                    <input type="text" id="search-input" placeholder="搜车型/VIN/经办人" class="bg-transparent border-none outline-none text-sm ml-2 w-full font-bold" oninput="handleSearch()">
                    <button onclick="closeSearch()"><i data-lucide="x" class="w-4 h-4 text-slate-400"></i></button>
                </div>
                <div id="header-actions" class="flex items-center gap-5 text-slate-500">
                    <i data-lucide="search" class="w-5 h-5 cursor-pointer" onclick="openSearch()"></i>
                    <i data-lucide="arrow-up-down" class="w-5 h-5 cursor-pointer" onclick="toggleSheet('sort-sheet')"></i>
                    <i data-lucide="filter" class="w-5 h-5 cursor-pointer" onclick="toggleSheet('filter-sheet')"></i>
                    <button onclick="openCreate()" class="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-white flex-shrink-0 active:bg-blue-700">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>
        <div class="divide-y divide-gray-100 flex-grow" id="list-container"></div>

        <!-- PC table area -->
        <div id="pc-table-area" class="min-h-screen p-6">
            <!-- PC top bar -->
            <header id="pc-header" class="flex items-center justify-between mb-5">
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-black tracking-tighter text-slate-800">车辆作业台</h1>
                    <span id="pc-total-badge" class="text-xs font-bold bg-slate-100 text-slate-500 px-2.5 py-1 rounded-full"></span>
                </div>
                <div class="flex items-center gap-3">
                    <!-- Search -->
                    <div class="flex items-center bg-white border border-slate-200 rounded-xl px-3 py-2 gap-2 shadow-sm w-56">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 flex-shrink-0"></i>
                        <input type="text" id="pc-search-input" placeholder="搜车型 / VIN / 经办人"
                            class="bg-transparent border-none outline-none text-sm w-full font-medium placeholder:text-slate-300"
                            oninput="handlePcSearch()">
                    </div>
                    <!-- Filter energy -->
                    <select id="pc-energy-filter" onchange="handlePcFilter()" class="border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold bg-white shadow-sm outline-none cursor-pointer">
                        <option value="">全部能源</option>
                        <option value="纯电">纯电</option>
                        <option value="增程">增程</option>
                        <option value="燃油">燃油</option>
                    </select>
                    <!-- Filter user -->
                    <select id="pc-user-filter" onchange="handlePcFilter()" class="border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold bg-white shadow-sm outline-none cursor-pointer">
                        <option value="">全部经办人</option>
                        <option value="我 (张三)">我经办的</option>
                        <option value="李思源">李思源</option>
                        <option value="王建国">王建国</option>
                        <option value="赵明明">赵明明</option>
                    </select>
                    <!-- Sort -->
                    <select id="pc-sort-select" onchange="handlePcSort()" class="border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold bg-white shadow-sm outline-none cursor-pointer">
                        <option value="fullDate|desc">时间：最新优先</option>
                        <option value="fullDate|asc">时间：最早优先</option>
                        <option value="model|asc">车型：A - Z</option>
                    </select>
                    <!-- Export -->
                    <button onclick="exportExcel()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-black rounded-xl shadow-sm transition-colors">
                        <i data-lucide="download" class="w-4 h-4"></i>导出 Excel
                    </button>
                    <!-- New -->
                    <button onclick="openCreate()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-black rounded-xl shadow-sm transition-colors">
                        <i data-lucide="plus" class="w-4 h-4"></i>录入车辆
                    </button>
                </div>
            </header>

            <!-- Table -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="pc-table w-full border-collapse text-sm">
                        <thead>
                            <tr>
                                <th class="text-left px-4 py-3 text-[11px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap cursor-pointer select-none" onclick="pcSort('model')">
                                    <div class="flex items-center gap-1">车型 <span id="sort-icon-model" class="text-slate-300">↕</span></div>
                                </th>
                                <th class="text-left px-4 py-3 text-[11px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">能源/车牌</th>
                                <th class="text-left px-4 py-3 text-[11px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">VIN 码</th>
                                <th class="text-left px-4 py-3 text-[11px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">当前阶段</th>
                                <th class="text-left px-4 py-3 text-[11px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap cursor-pointer select-none" onclick="pcSort('purchasePrice')">
                                    <div class="flex items-center gap-1">采购价 <span id="sort-icon-purchasePrice" class="text-slate-300">↕</span></div>
                                </th>
                                <th class="text-left px-4 py-3 text-[11px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap cursor-pointer select-none" onclick="pcSort('fullDate')">
                                    <div class="flex items-center gap-1">日期 <span id="sort-icon-fullDate" class="text-slate-300">↕</span></div>
                                </th>
                                <th class="text-left px-4 py-3 text-[11px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">经办人</th>
                                <th class="px-4 py-3 text-[11px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="pc-table-body"></tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div class="flex items-center justify-between px-5 py-3 border-t border-slate-100 bg-slate-50/60">
                    <span id="pc-page-info" class="text-xs text-slate-400 font-bold"></span>
                    <div class="flex items-center gap-1.5" id="pc-pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== PAGE: DETAIL ===== -->
    <div id="page-detail" class="page">
        <header class="p-4 border-b sticky top-0 bg-white/95 backdrop-blur-md z-20">
            <div class="flex items-center gap-3 h-8">
                <button onclick="showPage('page-list')" class="text-slate-500 flex-shrink-0"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <h1 class="text-lg font-black tracking-tighter text-slate-800 flex-1">车辆详情</h1>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto" id="detail-content"></div>
    </div>

    <!-- ===== PAGE: CREATE ===== -->
    <div id="page-create" class="page">
        <header class="p-4 border-b sticky top-0 bg-white/95 backdrop-blur-md z-20">
            <div class="flex items-center gap-3 h-8">
                <button onclick="showPage('page-list')" class="text-slate-500 flex-shrink-0"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <h1 class="text-lg font-black tracking-tighter text-slate-800 flex-1">录入新车辆</h1>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto pb-28" id="create-content"></div>
        <div class="sticky bottom-0 bg-white border-t px-4 pt-3 pb-6 z-30">
            <button onclick="createSubmit()" class="w-full py-3.5 rounded-2xl bg-blue-600 text-white font-black text-sm flex items-center justify-center gap-2 active:bg-blue-700">
                <i data-lucide="check-circle-2" class="w-4 h-4"></i>确认录入
            </button>
        </div>
    </div>

    <!-- ===== PAGE: HANDLE ===== -->
    <div id="page-handle" class="page">
        <header class="p-4 border-b sticky top-0 bg-white/95 backdrop-blur-md z-20">
            <div class="flex items-center gap-3 h-8">
                <button onclick="showPage(handleBackPage)" class="text-slate-500 flex-shrink-0"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <h1 class="text-lg font-black tracking-tighter text-slate-800 flex-1">办理作业</h1>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto pb-32" id="handle-content"></div>
        <div class="sticky bottom-0 bg-white border-t px-4 pt-3 pb-6 z-30">
            <div class="flex gap-3">
                <button onclick="handleSave()" class="flex-1 py-3.5 rounded-2xl border-2 border-slate-200 text-slate-700 font-black text-sm flex items-center justify-center gap-1.5 active:bg-slate-50">
                    <i data-lucide="save" class="w-4 h-4"></i>确认提交
                </button>
                <button onclick="handleComplete()" class="flex-1 py-3.5 rounded-2xl bg-blue-600 text-white font-black text-sm flex items-center justify-center gap-1.5 active:bg-blue-700">
                    <i data-lucide="check-circle-2" class="w-4 h-4"></i>本阶段完成
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Sheets -->
<div id="sort-sheet-overlay" class="fixed inset-0 z-[100] overlay opacity-0 hidden" onclick="toggleSheet('sort-sheet')">
    <div id="sort-sheet" class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white sheet hidden-sheet p-6 pb-10" onclick="event.stopPropagation()">
        <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
        <h3 class="text-lg font-black mb-4 italic">排序方式</h3>
        <div class="space-y-2" id="sort-options"></div>
    </div>
</div>
<div id="filter-sheet-overlay" class="fixed inset-0 z-[100] overlay opacity-0 hidden" onclick="toggleSheet('filter-sheet')">
    <div id="filter-sheet" class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white sheet hidden-sheet p-6 pb-10" onclick="event.stopPropagation()">
        <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-black italic text-slate-800">多维筛选</h3>
            <span class="text-xs font-bold text-blue-600 underline cursor-pointer" onclick="resetFilters()">重置</span>
        </div>
        <div class="space-y-6">
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">任务归属</p>
                <div class="flex gap-2">
                    <button id="user-all" onclick="updateFilter('user', null, this)" class="filter-btn-active px-5 py-2 rounded-full border text-xs font-bold">全部</button>
                    <button onclick="updateFilter('user', '我 (张三)', this)" class="px-5 py-2 rounded-full border border-slate-200 text-slate-500 text-xs font-bold">我经办的</button>
                </div>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">能源类型</p>
                <div class="flex flex-wrap gap-2">
                    <button id="energy-all" onclick="updateFilter('energy', null, this)" class="filter-btn-active px-5 py-2 rounded-lg border text-xs font-bold">全部</button>
                    <button onclick="updateFilter('energy', '纯电', this)" class="px-5 py-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold">纯电</button>
                    <button onclick="updateFilter('energy', '增程', this)" class="px-5 py-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold">增程</button>
                    <button onclick="updateFilter('energy', '燃油', this)" class="px-5 py-2 rounded-lg border border-slate-200 text-slate-500 text-xs font-bold">燃油</button>
                </div>
            </div>
        </div>
        <button class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm mt-8" onclick="pcPage=1;renderBoth()">确定</button>
    </div>
</div>

<script>
const statusDefs = {
    101:{stage:'采购',name:'确认车辆车况、钥匙数量、配置、车架号、交强险到期时间',produced:'记录车辆基础档案、交强险到期日',required:null,refs:null},
    102:{stage:'采购',name:'确定车辆价格，记录内饰及外观受损情况，同步告知比什凯克负责人',produced:'上传初验照片、记录外观受损清单、记录车辆价格',required:null,refs:null},
    103:{stage:'采购',name:'完成车辆付款',produced:'上传采购付款凭证/收据',required:null,refs:null},
    104:{stage:'采购',name:'拍摄车辆照片及视频发送至比什凯克负责人，用于推广宣传',produced:'上传车辆宣传多媒体素材(照片/视频)',required:null,refs:null},
    201:{stage:'整备',name:'去除前挡、主副驾玻璃膜',produced:'上传整备前/后对比照',required:null,refs:null},
    202:{stage:'整备',name:'按需更换雨刮器、轮胎，判断是否需要钣金、喷漆',produced:'上传维修/更换配件清单及发票',required:null,refs:null},
    203:{stage:'整备',name:'完成发动机基础保养',produced:'上传保养记录单',required:null,refs:null},
    204:{stage:'整备',name:'新能源车根据比什凯克负责人需求，下单采购充电桩',produced:'上传充电桩采购合同、购买发票',required:null,refs:null},
    301:{stage:'过户及出口待转移',name:'如果没交强险需要重新购买交强险',produced:'上传新交强险保单、保险缴费凭证',required:null,refs:'原车保单照片(101)'},
    302:{stage:'过户及出口待转移',name:'本地牌照可以直接办理出口带转移',produced:'增值税专用发票、过户凭证',required:'试点公司公章、营业执照原件、委托人身份证原件、委托书、机动车登记证书、行驶证',refs:null},
    303:{stage:'过户及出口待转移',name:'外地牌照需要先过户到当地背户公司,然后再办理出口待转移',produced:'增值税专用发票、背户协议',required:'背户公司和试点公司的公章及营业执照原件、委托人身份证原件、委托书、机动车登记证书、行驶证',refs:null},
    304:{stage:'过户及出口待转移',name:'第三方检测机构出具二手车检验报告和自我声明',produced:'二手车检验报告、自我声明',required:null,refs:null},
    305:{stage:'过户及出口待转移',name:'机动车检测站出新的机动车登记证书、行驶证以及二手车发票',produced:'新机动车登记证书、新行驶证照片',required:null,refs:null},
    306:{stage:'过户及出口待转移',name:'支付上牌费、公安费、出口费用,并取得发票',produced:'各项规费发票/收据',required:null,refs:null},
    401:{stage:'运输-成都至喀什',name:'与比什凯克负责人确定清关信息及收集资料',produced:'公司营业执照或个人身份证照片',required:null,refs:null},
    501:{stage:'出口资质',name:'出口公司办理出口许可证以及装箱单',produced:'出口许可证、装箱单',required:'需提供清关、接车人资料',refs:'新行驶证(305)、吉国买方资料(401)'},
    601:{stage:'国内报关',name:'国内报关资料核对',produced:'海关出口货物报关单、通关无纸化放行通知书、出口货物单证',required:'车辆出口许可证、吉尔吉斯本地人身份证或公司营业执照、外贸合同、车辆发票、车辆箱单、形式发票、报关单、委托报关协议、国际道路货物运单、车辆保单',refs:'许可证(501)、买方资料(401)、外贸合同（401）、车辆发票（305）'},
    701:{stage:'运输-喀什至比什凯克',name:'与物流公司交车,确认车况,并告知比什凯克负责人',produced:'国际道路货物运单(CMR/TIR)',required:null,refs:null},
    702:{stage:'运输-喀什至比什凯克',name:'与比什凯克负责人确定清关信息及收集资料',produced:'清关资料核对表',required:'公司营业执照或个人身份证照片',refs:'吉国买方公司营业执照或个人身份证照片(401)'},
    801:{stage:'吉国清关',name:'清关人员接收车辆并验车,确认随车资料',produced:'到货验车单',required:null,refs:'新机动车登记证书(305)'},
    802:{stage:'吉国清关',name:'确定车辆高清或者低清，是否享受电车免关税清关',produced:'关税计算核定表',required:null,refs:null},

function generatePlate(energy) {
    const pros=['京','沪','粤','浙','苏','鲁','川','皖'];
    const pro=pros[Math.floor(Math.random()*pros.length)];
    const city=String.fromCharCode(65+Math.floor(Math.random()*6));
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ0123456789";
    if(energy==='纯电'||energy==='增程'){
        let num=(energy==='纯电'?'D':'F');
        for(let i=0;i<5;i++)num+=chars.charAt(Math.floor(Math.random()*chars.length));
        return `${pro}${city}·${num}`;
    }else{
        let num="";
        for(let i=0;i<5;i++)num+=chars.charAt(Math.floor(Math.random()*chars.length));
        return `${pro}${city}·${num}`;
    }
}

// Real-format 17-digit VIN generator
// Structure: WMI(3) + VDS(6) + VIS(8)
// WMI: manufacturer codes matching real Chinese NEV makers
function generateVin(energy) {
    const wmis = {
        '纯电': ['LSGBE','LSV7E','LKL4E','LFV4C','LS5E4','LVVDB','LB1GC','LJNFE'],
        '增程': ['L6T5B','LSJA2','LFV4C','LS5E4'],
        '燃油': ['LGWEF','LSVCC','LFV4A','LHGCM','LNBSCC','LVVDB'],
    };
    const pool = wmis[energy] || wmis['燃油'];
    const wmi = pool[Math.floor(Math.random() * pool.length)];
    const chars = 'ABCDEFGHJKLMNPRSTUVWXYZ0123456789'; // no I,O,Q
    // VDS: 6 chars (vehicle descriptor)
    let vds = '';
    for(let i=0;i<6;i++) vds += chars[Math.floor(Math.random()*chars.length)];
    // VIS: 8 chars, last 4 are digits (serial)
    const year = ['M','N','P','R','S','T','V','W','X','Y','1','2','3','4','5'][Math.floor(Math.random()*15)];
    const plant = chars[Math.floor(Math.random()*chars.length)];
    const serial = String(Math.floor(Math.random()*9999)+1).padStart(6,'0');
    return (wmi + vds + year + plant + serial).substring(0,17).toUpperCase();
}

function mockHistory(statusCode){
    const allCodes=Object.keys(statusDefs).map(Number).sort((a,b)=>a-b);
    const idx=allCodes.indexOf(statusCode);
    const done=allCodes.slice(Math.max(0,idx-3),idx);
    // Generate realistic sequential dates going back from today
    const baseDay = 15;
    const result=done.map((code,i)=>({
        code,status:'done',
        handler:['李思源','王建国','赵明明','张三'][i%4],
        date:`2024-03-${String(baseDay - (done.length - i) * 3).padStart(2,'0')}`
    }));
    result.push({code:statusCode,status:'current',handler:'我 (张三)',date:'进行中'});
    return result.reverse();
}

let pcPage = 1;
const PC_PAGE_SIZE = 10;

function isPC() { const el = document.getElementById('pc-table-area'); return el ? el.offsetParent !== null : window.innerWidth >= 900; }

// Single source of truth: reuse mobile currentFilters / currentSort / searchQuery
function getFiltered() {
    return rawData.filter(item => {
        const s = searchQuery.toLowerCase();
        const searchMatch = !s || item.model.toLowerCase().includes(s) || item.vin.toLowerCase().includes(s) || item.user.toLowerCase().includes(s) || item.plate.toLowerCase().includes(s);
        return (!currentFilters.user || item.user === currentFilters.user)
            && (!currentFilters.energy || item.energy === currentFilters.energy)
            && searchMatch;
    }).sort((a, b) => {
        let vA = a[currentSort.key] ?? '', vB = b[currentSort.key] ?? '';
        if (currentSort.key === 'purchasePrice') { vA = parseFloat(vA)||0; vB = parseFloat(vB)||0; return currentSort.order==='asc'? vA-vB : vB-vA; }
        return currentSort.order==='asc' ? String(vA).localeCompare(String(vB)) : String(vB).localeCompare(String(vA));
    });
}

            <td class="px-4 py-3 text-center whitespace-nowrap">
                <div class="flex items-center justify-center gap-2">
                    <button onclick="event.stopPropagation();openDetail(${item.id})" class="text-[11px] font-black text-slate-500 hover:text-blue-600 px-2 py-1 rounded-lg hover:bg-blue-50 transition-colors">详情</button>
                    ${isMe?`<button onclick="event.stopPropagation();openDetailThenHandle(${item.id})" class="text-[11px] font-black text-blue-600 px-2.5 py-1 rounded-lg bg-blue-50 hover:bg-blue-100 transition-colors flex items-center gap-1"><i data-lucide="arrow-right-circle" class="w-3 h-3"></i>去办理</button>`:''}
                </div>
            </td>
        </tr>`;
    }).join('');

    // Page info
    const start = total===0?0:(pcPage-1)*PC_PAGE_SIZE+1;
    const end = Math.min(pcPage*PC_PAGE_SIZE, total);
    document.getElementById('pc-page-info').textContent = `显示 ${start}–${end} 条，共 ${total} 条`;

    // Pagination
    renderPagination(totalPages);
    lucide.createIcons();
}

function syncPcUI() {
    const v = id => document.getElementById(id);
    if (v('pc-search-input') && document.activeElement !== v('pc-search-input')) v('pc-search-input').value = searchQuery;
    if (v('pc-energy-filter')) v('pc-energy-filter').value = currentFilters.energy || '';
    if (v('pc-user-filter'))   v('pc-user-filter').value   = currentFilters.user   || '';
    if (v('pc-sort-select'))   v('pc-sort-select').value   = currentSort.key + '|' + currentSort.order;
}
function renderBoth() { syncPcUI(); renderList(); if (isPC()) renderPcTable(); }

function renderPagination(totalPages) {
    const pg = document.getElementById('pc-pagination');
    if (!pg) return;
    // Always show: prev, first, ..., current-1, current, current+1, ..., last, next
    const delta = 1;
    const range = [];
    for (let i = Math.max(2, pcPage-delta); i <= Math.min(totalPages-1, pcPage+delta); i++) range.push(i);
    if (pcPage-delta > 2) range.unshift('...');
    if (pcPage+delta < totalPages-1) range.push('...');
    if (totalPages > 1) range.unshift(1);
    range.push(totalPages);

    let html = `<button class="pagination-btn" onclick="pcGoPage(${pcPage-1})" ${pcPage===1?'disabled':''}>‹</button>`;
    range.forEach(p => {
        if (p==='...') html += `<span class="px-1 text-slate-400 text-sm">…</span>`;
        else html += `<button class="pagination-btn ${p===pcPage?'active':''}" onclick="pcGoPage(${p})">${p}</button>`;
    });
    html += `<button class="pagination-btn" onclick="pcGoPage(${pcPage+1})" ${pcPage===totalPages?'disabled':''}>›</button>`;
    pg.innerHTML = html;
}

function pcGoPage(p) {
    const filtered = getFiltered();
    const totalPages = Math.max(1, Math.ceil(filtered.length / PC_PAGE_SIZE));
    if (p < 1 || p > totalPages) return;
    pcPage = p;
    renderPcTable();
    document.getElementById('pc-table-area').scrollTo({top:0, behavior:'smooth'});
}

function pcSort(key) {
    if (currentSort.key === key) currentSort.order = currentSort.order==='asc'?'desc':'asc';
    else { currentSort.key = key; currentSort.order = 'desc'; }
    pcPage = 1;
    renderBoth();
}

function resetPage(){ pcPage=1; renderBoth(); }
function handlePcSearch() {
    searchQuery = (document.getElementById('pc-search-input')?.value || '').toLowerCase();
    document.getElementById('search-input').value = searchQuery;
    resetPage();
}
function handlePcFilter() {
    currentFilters.energy = document.getElementById('pc-energy-filter')?.value || null;
    currentFilters.user   = document.getElementById('pc-user-filter')?.value   || null;
    resetPage();
}
function handlePcSort() {
    const [key, order] = (document.getElementById('pc-sort-select')?.value || 'fullDate|desc').split('|');
    currentSort = { key, order };
    resetPage();
}

// Export Excel
function exportExcel() {
    const filtered = getFiltered();
    const rows = [
        ['车型','颜色','能源类型','车牌号','VIN码','车牌归属','采购价(万)','配置','受损情况','当前阶段','当前状态','经办人','录入日期'],
        ...filtered.map(v => [
            v.model, v.color, v.energy, v.plate, v.vin, v.plateType,
            v.purchasePrice, v.config, v.damage,
            v.stageName, statusDefs[v.statusCode]?.name||'',
            v.user, v.fullDate
        ])
    ];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Column widths
    ws['!cols'] = [20,8,6,12,20,10,10,30,20,16,40,10,12].map(w=>({wch:w}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '车辆作业台');
    const date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `车辆作业台_${date}.xlsx`);
    showToast('Excel 已导出 ✓');
}

window.addEventListener('scroll', () => {
    if (isPC()) return;
    // Load more when approaching the bottom trigger
    const trigger = document.getElementById('mobile-load-more');
    if (trigger && trigger.getBoundingClientRect().top < window.innerHeight + 120) {
        pcPage++;
        renderList();
        lucide.createIcons();
        return;
    }
    // Sync pcPage with current scroll position (for PC alignment on switch)
    const cards = document.querySelectorAll('#list-container .mobile-card');
    if (!cards.length) return;
    let topCardIndex = 0;
    for (let i = 0; i < cards.length; i++) {
        if (cards[i].getBoundingClientRect().top <= 80) topCardIndex = i;
        else break;
    }
    pcPage = Math.floor(topCardIndex / PC_PAGE_SIZE) + 1;
});

// Resize handler: on breakpoint cross, re-render and position by pcPage
let _lastIsPC = isPC();
let _resizeTimer = null;
window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
        const now = isPC();
        if (now === _lastIsPC) return;
        _lastIsPC = now;
        renderBoth();
        // After render, scroll mobile to the start of current pcPage
        if (!now) scrollMobileToPcPage();
    }, 150);
});

function scrollMobileToPcPage() {
    if (pcPage <= 1) return;
    const targetIndex = (pcPage - 1) * PC_PAGE_SIZE;
    // Wait for DOM to settle then scroll
    requestAnimationFrame(() => {
        const cards = document.querySelectorAll('#list-container .mobile-card');
        if (cards[targetIndex]) cards[targetIndex].scrollIntoView({ block: 'start' });
    });
}


renderBoth();
</script>
